# Set unique port
quarkus.http.port=8081

# Enforce authentication for MCP SSE
quarkus.http.auth.permission.authenticated.paths=/mcp/sse
quarkus.http.auth.permission.authenticated.policy=authenticated

# Enable MCP logging
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=1000

# CORS filter required by the Streamable HTTP MCP transport, scoped to the local agent
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:8080

# Log REST client request-response
quarkus.rest-client.logging.scope=request-response

# Base URL for the internal self-call REST client (token propagation)
quarkus.rest-client.weather-internal.url=http://localhost:8081
